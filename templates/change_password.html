{% extends 'base.html' %}
{% block content %}
<div class="page-head"><h1>Đổi mật khẩu</h1></div>
<div class="panel" style="max-width:480px">
  <form method="post" class="form-grid">
    <div class="full"><label>Mật khẩu cũ</label><input type="password" name="old_password" required></div>
    <div class="full"><label>Mật khẩu mới</label><input type="password" name="new_password" required></div>
    <div class="full"><label>Xác nhận mật khẩu mới</label><input type="password" name="confirm_password" required></div>
    <div class="form-actions"><button class="btn btn-primary">Lưu</button>
      <a href="{{ url_for('dashboard') }}" class="btn">Hủy</a></div>
  </form>
</div>
{% endblock %}
