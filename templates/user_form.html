{% extends 'base.html' %}
{% block content %}
<div class="page-head"><h1>{{ 'Sửa tài khoản' if user else 'Thêm tài khoản' }}</h1></div>
<div class="panel" style="max-width:640px">
  <form method="post" class="form-grid" enctype="multipart/form-data">
    <div class="full" style="text-align:center">
      <img id="avatarPreview" class="avatar avatar-lg"
        src="{{ url_for('avatar_file', filename=user.avatar) if user and user.avatar else url_for('static', filename='logo.png') }}"
        alt="avatar">
      <div><label style="display:inline-block;margin-top:8px">Ảnh đại diện (hình tròn)</label></div>
      <input type="file" name="avatar" accept="image/*" onchange="previewAvatar(this)" style="max-width:280px;margin:0 auto">
    </div>
    <div><label>Tên đăng nhập</label>
      <input name="username" value="{{ user.username if user else '' }}" {{ 'readonly' if user }} required></div>
    <div><label>{{ 'Mật khẩu mới (để trống nếu không đổi)' if user else 'Mật khẩu' }}</label>
      <input type="text" name="password" {{ '' if user else 'required' }}></div>
    <div><label>Họ tên</label><input name="full_name" value="{{ user.full_name or '' if user else '' }}"></div>
    <div><label>Vai trò</label>
      <select name="role">
        {% for key, label in ROLES.items() %}
        {% if not has_role('manager') or key in ('student','parent') %}
        <option value="{{ key }}" {{ 'selected' if user and user.role==key }}>{{ label }}</option>
        {% endif %}
        {% endfor %}
      </select>
      {% if has_role('manager') %}<small class="muted">Quản lý lớp chỉ tạo được tài khoản Học sinh và Phụ huynh.</small>{% endif %}
    </div>
    <div><label>Email</label><input name="email" value="{{ user.email or '' if user else '' }}"></div>
    <div><label>Số điện thoại</label><input name="phone" value="{{ user.phone or '' if user else '' }}"></div>
    {% if user %}
    <div class="full"><label><input type="checkbox" name="active" {{ 'checked' if user.active }}> Tài khoản hoạt động</label></div>
    {% endif %}
    <div class="form-actions"><button class="btn btn-primary">Lưu</button>
      <a href="{{ url_for('users_list') }}" class="btn">Hủy</a></div>
  </form>
</div>
<script>
function previewAvatar(input){
  if(input.files && input.files[0]){
    var r = new FileReader();
    r.onload = function(e){ document.getElementById('avatarPreview').src = e.target.result; };
    r.readAsDataURL(input.files[0]);
  }
}
</script>
{% endblock %}
