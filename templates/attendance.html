{% extends 'base.html' %}
{% block content %}
<div class="page-head"><h1>Điểm danh</h1></div>

<div class="panel">
  <form method="get" class="toolbar">
    <select name="class_id" required>
      <option value="">-- Chọn lớp --</option>
      {% for c in classes %}<option value="{{ c.id }}" {{ 'selected' if sel_class==c.id }}>{{ c.name }}</option>{% endfor %}
    </select>
    <input type="date" name="date" value="{{ sel_date }}">
    <button class="btn btn-primary">Xem danh sách</button>
  </form>
</div>

{% if sel_class and students %}
<div class="panel">
  <h2>Buổi ngày {{ sel_date }}</h2>
  <form method="post" action="{{ url_for('attendance_view') }}">
    <input type="hidden" name="class_id" value="{{ sel_class }}">
    <input type="hidden" name="date" value="{{ sel_date }}">
    <div class="table-wrap">
    <table>
      <thead><tr><th>Học sinh</th><th>Trạng thái</th><th>Ghi chú</th></tr></thead>
      <tbody>
        {% for s in students %}
        <tr>
          <td><strong>{{ s.full_name }}</strong></td>
          <td>
            <select name="status_{{ s.id }}">
              {% for key, label in ATTENDANCE_LABELS.items() %}
              <option value="{{ key }}" {{ 'selected' if (s.status or 'present')==key }}>{{ label }}</option>
              {% endfor %}
            </select>
          </td>
          <td><input name="note_{{ s.id }}" value="{{ s.note or '' }}" placeholder="Ghi chú"></td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    </div>
    <div style="margin-top:14px"><button class="btn btn-primary">Lưu điểm danh</button></div>
  </form>
</div>
{% elif sel_class %}
<div class="empty">Lớp này chưa có học sinh.</div>
{% endif %}
{% endblock %}
